# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Defaults, please don't edit. Change settings.conf instead.
source = ~/.config/hypr/settings.example.conf

input {
    kb_options = grp:win_space_toggle
}

source = ~/.config/hypr/settings.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto
source = ~/.config/hypr/monitors.conf                                   # pacman -S nwg-displays
source = ~/.config/hypr/workspaces.conf

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$fileManager = nautilus --new-window                        # pacman -S nautilus
$menu = rofi -show combi -modes "combi,window,ssh" -combi-modes ":~/.config/rofi/links.sh '$webapp',drun"

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = GTK_THEME,adw-gtk3-dark
env = QT_QPA_PLATFORMTHEME,qt6ct

env = XCURSOR_THEME,future-dark
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = SDL_VIDEODRIVER,wayland

# SSH
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/gcr/ssh

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = test $askPasswordOnLogin -eq 1 && hyprlock

exec-once = systemctl --user enable --now swaync.service
exec-once = systemctl --user enable --now hypridle.service
exec-once = systemctl --user enable --now hyprpolkitagent.service
exec-once = systemctl --user enable --now gcr-ssh-agent.socket

# Configure GTK dark-theme
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"

# Restart waybar service on hypctl reload
exec = systemctl --user restart waybar.service
exec = waypaper --restore

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

ecosystem {
    no_donation_nag = true
#   enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 1

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(BC958Eff) rgba(BC958Eff) 45deg
    col.inactive_border = rgba(000008aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle

    snap {
        enabled = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    active_opacity = 1.0
    inactive_opacity = 0.80

    rounding = 5
    rounding_power = 2.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, slide
    animation = workspacesOut, 1, 1.94, almostLinear, slide
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    # DEPRECATED v0.55.0
    #pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    key_press_enables_dpms = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
    enabled = $xwayland
    force_zero_scaling = true
}

###################
### KEYBINDINGS ###
###################

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bindd = $mainMod, return, Open Terminal, exec, $terminal
bindd = $mainMod, T, Open Terminal, exec, $terminal
bindd = $mainMod SHIFT, Q, Kill Active Window, killactive
bindd = $mainMod, B, Open Web Browser, exec, $browser
bindd = CTRL ALT, backspace, Terminate Wayland Server, exec, ~/.config/hypr/scripts/power.sh
bindd = $mainMod, E, Open Filemanager, exec, $fileManager
bindd = $mainMod, V, Toggle Window Floating, togglefloating,
bindd = $mainMod, D, app-launcher, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
bindd = $mainMod, F, Toggle Fullscreen, fullscreen
# DEPRECATED v0.54.0
#bindd = $mainMod, J, Toggle Splitmode, togglesplit, # dwindlew
bindd = $mainMod, J, Toggle Splitmode, layoutmsg, togglesplit
bindd = $mainMod, L, Lock System, exec, loginctl lock-session

# Resize active window
bind = $mainMod, minus, resizeactive, -100 0
bind = $mainMod, equal, resizeactive, 100 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -100
bind = $mainMod SHIFT, equal, resizeactive, 0 100
bind = $mainMod, R, submap, resize
submap=resize
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
binde = SHIFT, right, resizeactive, 100 0
binde = SHIFT, left, resizeactive, -100 0
binde = SHIFT, up, resizeactive, 0 -100
binde = SHIFT, down, resizeactive, 0 100
bind = , return, submap, reset
submap=reset

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod ALT, 1, workspace, 11
bind = $mainMod ALT, 2, workspace, 12
bind = $mainMod ALT, 3, workspace, 13
bind = $mainMod ALT, 4, workspace, 14
bind = $mainMod ALT, 5, workspace, 15
bind = $mainMod ALT, 6, workspace, 16
bind = $mainMod ALT, 7, workspace, 17
bind = $mainMod ALT, 8, workspace, 18
bind = $mainMod ALT, 9, workspace, 19
bind = $mainMod ALT, 0, workspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod ALT SHIFT, 1, movetoworkspace, 11
bind = $mainMod ALT SHIFT, 2, movetoworkspace, 12
bind = $mainMod ALT SHIFT, 3, movetoworkspace, 13
bind = $mainMod ALT SHIFT, 4, movetoworkspace, 14
bind = $mainMod ALT SHIFT, 5, movetoworkspace, 15
bind = $mainMod ALT SHIFT, 6, movetoworkspace, 16
bind = $mainMod ALT SHIFT, 7, movetoworkspace, 17
bind = $mainMod ALT SHIFT, 8, movetoworkspace, 18
bind = $mainMod ALT SHIFT, 9, movetoworkspace, 19
bind = $mainMod ALT SHIFT, 0, movetoworkspace, 20

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod ALT, right, workspace, e+1  
bind = $mainMod ALT, left, workspace, e-1  

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Cycle through applications on active workspace
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop


# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot --freeze -m window
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -z -m output
# Screenshot a region
bind = $mainMod SHIFT, PRINT, exec, hyprshot -z -m region

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#xwayland
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

windowrule {
    # Float and center file pickers
    name = floating-file-picker
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save).*$

    float = on
    center = on
    size = 50% 50%
}

# Define content types
windowrule = match:class ^steam_app_\d+$ content game
windowrule = match:title ^.*(youtube|emby).*$ content video

# Define tags
windowrule = match:content photo, tag +photo
windowrule = match:content video, tag +video
windowrule = match:content game, tag +game
windowrule = match:class ^(foot|Alacritty|kitty)$, tag +terminal
windowrule = match:class ^((f|F)irefox|(v|V)ivaldi|(c|C)hrome|(c|C)hromium|(b|B)rave).*$, tag +browser

windowrule {
    name = Force browser into a tile mode
    match:tag = browser

    tile = on
    fullscreen = 1
    fullscreen_state = 0 2
    sync_fullscreen = 0
}

# Some dash of floating for various (setting) apps
windowrule = match:class qalculate-gtk float
windowrule = match:class org.gnome.(Calculator|Nautilus) float
windowrule = match:class waypaper float
windowrule = match:class com.network.manager float
windowrule = match:class nwg-displays float
windowrule = match:class blueman-manager float
windowrule = match:class org.pulseaudio.pavucontrol float

windowrule {
    # Force focus for Nautilus dialogs
    name = nautilus-dialog-focus
    match:class = org.gnome.Nautilus
    match:title = ^$

    stay_focused = on
}

windowrule = match:class gcr-prompter, stay_focused on

windowrule {
    # Disable lockscreen when game is opened
    name = game-idle-focus
    match:tag = game

    rounding = 0
    idle_inhibit = focus
}

windowrule {
    name = opacity-tag-terminal
    match:tag = terminal
    opacity = 0.98 0.94
}

source = ~/.config/hypr/rules.conf
