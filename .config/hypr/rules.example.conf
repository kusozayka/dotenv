# Window properties lists (incl. 'class'): `hyprctl clients`

# Start the terminal when workspace 5 is being created (see settings.example.conf for existing variables)
#workspace = 5, on-created-empty:$terminal

# Assign a custom icon for workspace 1 - https://fontawesome.com/icons
#workspace = 1, defaultName:<span weight="normal"></span>
